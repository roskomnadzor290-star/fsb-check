<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>РОСИНКАС · Проверка наличных</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020408; color: #c0c8d4; font-family: 'Courier New', 'Segoe UI', monospace;
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      padding: 1.5rem;
      background-image: 
        radial-gradient(ellipse at 50% 0%, rgba(0,120,60,0.12) 0%, transparent 70%),
        radial-gradient(ellipse at 50% 100%, rgba(0,20,40,0.9) 0%, transparent 70%);
    }
    .container { max-width: 850px; width: 100%; margin: 0 auto; }

    .header {
      text-align: center; margin-bottom: 1.5rem; padding: 1.5rem;
      background: rgba(10,15,26,0.8); border: 1px solid #1e3040; border-radius: 16px;
    }
    .logo-icon { font-size: 3rem; margin-bottom: 0.5rem; filter: drop-shadow(0 0 15px rgba(192,160,96,0.5)); }
    .logo-text { font-size: 2rem; font-weight: 900; color: #c0a060; letter-spacing: 6px; text-shadow: 0 0 25px rgba(192,160,96,0.5); }
    .subtitle { font-size: 0.7rem; color: #7a8ba6; letter-spacing: 3px; margin-top: 0.5rem; }

    .timer-card {
      background: linear-gradient(145deg, #0a0f1a, #0d1320);
      border: 2px solid #4a3a15; border-radius: 16px; padding: 1.5rem;
      text-align: center; margin-bottom: 1.5rem;
      box-shadow: 0 0 40px rgba(240,192,64,0.15); animation: timerGlow 3s infinite;
    }
    .timer-title { font-size: 0.7rem; color: #f0c040; letter-spacing: 3px; margin-bottom: 0.8rem; text-transform: uppercase; }
    .timer-value { font-size: 3rem; font-weight: 900; color: #f0c040; text-shadow: 0 0 25px rgba(240,192,64,0.7); letter-spacing: 4px; }
    .timer-sub { font-size: 0.6rem; color: #6b7d95; margin-top: 0.5rem; letter-spacing: 1px; }

    .progress-section { margin-top: 1rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.6rem; color: #6b7d95; margin-bottom: 0.3rem; letter-spacing: 1px; }
    .progress-track { height: 10px; background: #1a2540; border-radius: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #50f070, #f0c040); border-radius: 5px; transition: width 0.4s ease; box-shadow: 0 0 15px rgba(240,192,64,0.5); }

    .certificate-section { text-align: center; margin: 1.5rem 0; display: none; }
    .certificate-section.show { display: block; animation: fadeInUp 0.6s ease; }
    .btn-certificate {
      display: inline-block; padding: 1rem 2.5rem;
      background: linear-gradient(145deg, #0a2a0f, #0d3d15);
      border: 2px solid #50f070; border-radius: 12px;
      color: #50f070; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
      font-family: inherit; transition: all 0.3s ease;
      box-shadow: 0 0 25px rgba(80,240,112,0.3);
      animation: certGlow 2s infinite; text-decoration: none;
    }
    .btn-certificate:hover { box-shadow: 0 0 45px rgba(80,240,112,0.6); transform: translateY(-2px); }

    .card { background: #0a101c; border: 1px solid #1e3040; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
    .card-title { font-size: 0.65rem; color: #7a8ba6; letter-spacing: 2px; margin-bottom: 1rem; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; animation: dotPulse 1.5s infinite; }
    .dot.green { background: #50f070; box-shadow: 0 0 10px rgba(80,240,112,0.6); }
    .dot.yellow { background: #f0c040; box-shadow: 0 0 10px rgba(240,192,64,0.6); }

    .stats { display: flex; justify-content: space-around; text-align: center; margin: 0.5rem 0 1rem; }
    .stat-item { flex: 1; }
    .stat-value { font-size: 1.4rem; font-weight: 700; }
    .stat-label { font-size: 0.55rem; color: #6b7d95; letter-spacing: 1px; margin-top: 0.2rem; }

    .banknote-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
      gap: 5px; justify-items: center; margin: 0.5rem 0;
      max-height: 280px; overflow-y: auto; padding: 0.3rem;
    }
    .banknote-tile {
      width: 38px; height: 24px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.5rem; font-weight: 700; opacity: 0; transform: scale(0);
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .banknote-tile.show { opacity: 1; transform: scale(1); }
    .banknote-tile.clean {
      background: linear-gradient(145deg, #0a2a0f, #0d3d15);
      color: #50f070; border: 1px solid #154a25;
      box-shadow: 0 0 10px rgba(80,240,112,0.3);
    }
    .banknote-tile.dirty {
      background: linear-gradient(145deg, #2a0a0f, #3d1015);
      color: #ff4d4d; border: 1px solid #4a1525;
      box-shadow: 0 0 12px rgba(255,50,50,0.4);
      animation: dirtyGlow 1.5s infinite;
    }

    .log-container {
      max-height: 140px; overflow-y: auto; font-size: 0.55rem;
      color: #6b7d95; margin-top: 0.8rem; background: #060b14;
      border-radius: 8px; padding: 0.5rem; border: 1px solid #1a2540;
    }
    .log-entry { padding: 0.25rem 0; border-bottom: 1px solid #111a28; display: flex; align-items: center; gap: 0.5rem; }
    .log-time { color: #4a5a70; font-size: 0.5rem; min-width: 45px; }
    .log-serial { letter-spacing: 0.5px; min-width: 70px; }
    .log-nominal { min-width: 45px; text-align: right; }
    .log-status { font-weight: 700; min-width: 70px; text-align: right; }

    .warning-box {
      background: #1a0a0f; border: 1px solid #4a1525; border-radius: 8px;
      padding: 0.7rem; margin-top: 0.8rem; font-size: 0.6rem;
      color: #f0506a; text-align: center; letter-spacing: 1px;
    }
    .warning-box strong { color: #ff4d4d; font-size: 0.7rem; }

    .nav-link {
      text-align: center; margin-top: 1rem; font-size: 0.6rem;
    }
    .nav-link a { color: #7a8ba6; text-decoration: none; letter-spacing: 1px; }
    .nav-link a:hover { color: #c0c8d4; }

    .footer {
      text-align: center; margin-top: 2rem; font-size: 0.5rem;
      color: #3a4a60; border-top: 1px solid #1a2540; padding-top: 1rem; letter-spacing: 1px;
    }

    @keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes timerGlow { 0%, 100% { box-shadow: 0 0 20px rgba(240,192,64,0.2); } 50% { box-shadow: 0 0 45px rgba(240,192,64,0.5); } }
    @keyframes dirtyGlow { 0%, 100% { box-shadow: 0 0 8px rgba(255,50,50,0.3); } 50% { box-shadow: 0 0 20px rgba(255,50,50,0.7); } }
    @keyframes certGlow { 0%, 100% { box-shadow: 0 0 15px rgba(80,240,112,0.3); } 50% { box-shadow: 0 0 35px rgba(80,240,112,0.7); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a101c; }
    ::-webkit-scrollbar-thumb { background: #2a3a50; border-radius: 2px; }

    @media (max-width: 500px) {
      body { padding: 0.5rem; }
      .banknote-grid { grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); }
      .banknote-tile { width: 30px; height: 20px; font-size: 0.4rem; }
      .timer-value { font-size: 2rem; }
    }
  </style>
</head>

    <div class="header">
      <div class="logo-icon">🏛️</div>
